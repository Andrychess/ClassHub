<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClassHub — Материалы</title>
    <link rel="icon" href="assets/favicon.png" type="image/png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="topbar standalone-only">
        <div class="brand">
          <img class="brand-icon" src="assets/logo.png" width="64" height="64" alt="ClassHub" />
          <div>
            <h1>ClassHub</h1>
            <p class="subtitle">Материалы для занятий в учебной группе</p>
          </div>
        </div>
        <div class="source-card">
          <span class="label">Источник</span>
          <strong id="source-name">—</strong>
          <span id="source-host" class="muted">—</span>
        </div>
      </header>

      <div class="browser">
        <div class="browser-bar panel">
          <div class="browser-bar-main">
            <div class="browser-actions">
              <button id="btn-up" class="btn btn-icon" type="button" title="На уровень выше" aria-label="На уровень выше">↑</button>
              <button id="btn-refresh" class="btn btn-icon primary" type="button" title="Обновить" aria-label="Обновить">↻</button>
            </div>
            <nav id="breadcrumbs" class="breadcrumbs" aria-label="Путь">
              <button class="crumb-btn" data-path="" type="button">Корень</button>
            </nav>
          </div>
          <div class="browser-bar-side">
            <input id="search" type="search" placeholder="Поиск..." autocomplete="off" />
            <span id="item-count" class="badge">0</span>
          </div>
        </div>

        <section class="files-panel panel">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Имя</th>
                  <th>Размер</th>
                  <th class="col-modified">Изменён</th>
                  <th class="col-action"></th>
                </tr>
              </thead>
              <tbody id="files-body">
                <tr class="state-row">
                  <td colspan="4">Загрузка...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>

      <footer class="footer muted standalone-only">
        Файлы раздаются внутри локальной сети класса — только для участников группы.
      </footer>
    </div>

    <script src="/shared/dom.js"></script>
    <script src="app.js"></script>
  </body>
</html>
